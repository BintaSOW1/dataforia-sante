<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#006B3F" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DataforiaSanté" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-192.png" />

    <!-- SEO -->
    <meta name="description" content="Plateforme santé numérique du Sénégal — Médecins, Pharmacies, Hôpitaux, Téléconsultation" />
    <meta name="keywords" content="santé, médecin, pharmacie, hôpital, Sénégal, téléconsultation" />
    <meta name="author" content="DataforiaSanté" />

    <!-- Open Graph -->
    <meta property="og:title" content="DataforiaSanté" />
    <meta property="og:description" content="Plateforme santé numérique du Sénégal" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DataforiaSanté" />
    <meta name="twitter:description" content="Plateforme santé numérique du Sénégal" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />

    <title>DataforiaSanté — Plateforme santé numérique du Sénégal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('✅ Service Worker enregistré:', reg.scope))
            .catch((err) => console.log('❌ Service Worker erreur:', err));
        });
      }
    </script>
  </body>
</html>
